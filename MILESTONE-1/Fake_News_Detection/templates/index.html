<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detection</title>
</head>
<body style="font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f2f2f2; margin: 0;">

    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 5px 15px rgba(0,0,0,0.2); width: 500px; text-align: center;">

        <h1 style="margin-bottom: 10px;">📰 Fake News Detection</h1>
    

        
        <form action="/predict" method="post">
            <textarea name="news" placeholder="type the new here..." required
                      style="width: 100%; height: 120px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; resize: none;">{{ news if news else "" }}</textarea>
            <br><br>
            <button type="submit" style="padding: 10px 20px; border-radius: 8px; border: none; background-color: #4CAF50; color: white; cursor: pointer; font-size: 16px;">
                Predict
            </button>
        </form>


        {% if prediction %}
        <div style="margin-top: 25px; padding: 15px; border-radius: 8px; background-color: #e8e8e8;">
            <h2>Result: {{ prediction }}</h2>
            <p>Real Confidence: {{ real_conf }}%</p>
            <p>Fake Confidence: {{ fake_conf }}%</p>
            <p>Model Accuracy: {{ accuracy }}%</p>

            <h3>Input News:</h3>
            <p style="background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #ddd;">{{ news }}</p>
        </div>
        {% endif %}

    </div>

</body>
</html>
